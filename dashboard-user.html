
 

<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>لوحة التحكم - شخصلي AI</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

     <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>

        *{margin:0;padding:0;box-sizing:border-box}

        body{font-family:'Cairo',sans-serif;background:#F1F5F9;color:#1E293B;line-height:1.7}

        .dashboard{display:flex;min-height:100vh}

        .sidebar{width:260px;background:#FFF;border-left:1px solid #E2E8F0;padding:30px 20px;display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:100}

        .sidebar-logo{font-size:1.5rem;font-weight:900;margin-bottom:40px;text-align:center}

        .sidebar-menu{flex:1;display:flex;flex-direction:column;gap:8px}

        .sidebar-menu a{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:12px;text-decoration:none;color:#64748B;font-weight:600}

        .sidebar-menu a:hover,.sidebar-menu a.active{background:#EFF6FF;color:#2563EB}

        .notification-badge{background:#EF4444;color:#fff;padding:2px 8px;border-radius:50px;font-size:.75rem;display:none}

        .logout-btn{padding:14px;text-align:center;color:#EF4444;font-weight:700;cursor:pointer;border-radius:12px;margin-top:auto;background:none;border:none;font-size:1rem}

        .logout-btn:hover{background:#FEE2E2}

        .main-content{flex:1;margin-right:260px;padding:30px}

        .welcome h1{font-size:1.8rem;font-weight:900}.welcome p{color:#64748B;margin-bottom:25px}

        .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px}

        .card{background:#FFF;padding:25px;border-radius:16px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}

        .card-icon{font-size:2.5rem;margin-bottom:8px}.card-number{font-size:2rem;font-weight:900;color:#2563EB}.card-label{color:#64748B}

        .quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}

        .action-btn{background:#2563EB;color:#FFF;padding:20px;border-radius:16px;text-align:center;text-decoration:none;font-weight:700;display:block}.action-btn.green{background:#10B981}

        @media(max-width:768px){.dashboard{flex-direction:column}.sidebar{position:relative;width:100%;flex-direction:row;overflow-x:auto}.sidebar-menu{flex-direction:row}.main-content{margin-right:0}.cards{grid-template-columns:1fr}.quick-actions{grid-template-columns:1fr}}

    </style>

    <!-- PWA -->

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563EB">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="شخصلي">

<link rel="apple-touch-icon" href="assets/images/icon-192.png">

<script src="js/crypto-js.min.js"></script>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script src="js/firebase-config.js"></script>

 

</head>

<body>

 

    <div class="dashboard">

        <aside class="sidebar">

                <img src="assets/images/logo.png" alt="شخصلي" class="sidebar-logo-img">

            <!-- <div class="sidebar-logo">🤖 شخصلي</div> -->

            <nav class="sidebar-menu">

                <a href="dashboard-user.html" class="active"><span><i class="fas fa-home"></i> الرئيسية</span></a>

                <a href="diagnose.html"><span><i class="fas fa-stethoscope"></i> تشخيص عطل</span></a>

                <a href="devices.html"><span><i class="fas fa-mobile-alt"></i> أجهزتي</span></a>

                <a href="orders.html"><span><i class="fas fa-history"></i> طلباتي</span></a>

                <a href="notifications.html"><span><i class="fas fa-bell"></i> الإشعارات</span><span class="notification-badge" id="sidebarBadge">0</span></a>

            </nav>

            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>

        </aside>

        <main class="main-content">

            <div class="welcome"><h1>مرحباً <span id="userName">مستخدم</span> 👋</h1><p>لوحة التحكم الخاصة بك</p></div>

            <div class="cards"><div class="card"><div class="card-icon">📱</div><div class="card-number">0</div><div class="card-label">أجهزتي</div></div><div class="card"><div class="card-icon">🔧</div><div class="card-number">0</div><div class="card-label">طلبات صيانة</div></div><div class="card"><div class="card-icon">✅</div><div class="card-number">0</div><div class="card-label">مكتملة</div></div></div>

            <h2 style="margin-bottom:15px">⚡ إجراءات سريعة</h2>

            <div class="quick-actions"><a href="diagnose.html" class="action-btn">🔍 تشخيص عطل جديد</a><a href="devices.html" class="action-btn green">➕ إضافة جهاز جديد</a></div>

        </main>

    </div>

    <script>

        const user=JSON.parse(localStorage.getItem('shakhesly_current_user'));

        if(!user)window.location.href='index.html';

        else document.getElementById('userName').textContent=user.fullName||'مستخدم';

        function logout(){localStorage.removeItem('shakhesly_current_user');window.location.href='index.html'}

        // تحديث شارة الإشعارات

        const notifications=JSON.parse(localStorage.getItem('shakhesly_notifications'))||[];

        const unread=notifications.filter(n=>n.userId===user.id&&!n.read).length;

        const badge=document.getElementById('sidebarBadge');

        if(unread>0){badge.textContent=unread;badge.style.display='inline'}else{badge.style.display='none'}

    </script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>AOS.init({duration:600,once:true});</script>

<!-- تسجيل Service Worker -->

<script>

    if ('serviceWorker' in navigator) {

        window.addEventListener('load', function() {

            navigator.serviceWorker.register('sw.js').then(function(registration) {

                console.log('✅ Service Worker مسجل بنجاح');

            }).catch(function(error) {

                console.log('❌ فشل تسجيل Service Worker:', error);

            });

        });

    }

</script>

 

</body>

</html>
