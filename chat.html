<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة - شخصلي AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="chat.css">
    <!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="شخصلي">
<link rel="apple-touch-icon" href="icon-192.png"> 

</head>
<body>
    

    <div class="chat-container">
        <!-- ========== رأس الشات ========== -->
        <header class="chat-header">
            <a href="#" class="back-btn" id="btnBack"><i class="fas fa-arrow-right"></i> رجوع</a>
            <div class="chat-user-info">
                <div class="chat-avatar" id="chatAvatar">👤</div>
                <div>
                    <h3 id="chatName">جاري التحميل...</h3>
                    <span id="chatStatus">🟢 متصل</span>
                </div>
            </div>
            <span class="order-badge" id="orderBadge">طلب #0</span>
        </header>

        <!-- ========== رسائل الشات ========== -->
        <div class="chat-messages" id="chatMessages">
            <div class="chat-date">
                <span id="todayDate"></span>
            </div>
            <!-- الرسائل هتظهر هنا -->
        </div>

        <!-- ========== إدخال الرسالة ========== -->
        <div class="chat-input">
            <button class="btn-attach" id="btnAttach" title="إرفاق صورة">
                <i class="fas fa-paperclip"></i>
            </button>
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." autocomplete="off">
            <button class="btn-send" id="btnSend" title="إرسال">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="chat.js"></script>
    <!-- تسجيل Service Worker -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').then(function(registration) {
                console.log('✅ Service Worker مسجل بنجاح');
            }).catch(function(error) {
                console.log('❌ فشل تسجيل Service Worker:', error);
            });
        });
    }
</script> 

</body>
</html>
